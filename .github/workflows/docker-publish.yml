name: 自动构建推送镜像到ghcr.io

on:
  push:
    branches:
      - dev-go
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/mymihomo:${{ github.run_number }}
            ghcr.io/${{ github.repository_owner }}/mymihomo:latest

      - name: Set up Go (for Release binaries)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Release binaries
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          mkdir -p dist

          # linux/amd64
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/mymihomo-linux-amd64 ./cmd/mymihomo/

          # linux/arm64
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/mymihomo-linux-arm64 ./cmd/mymihomo/

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mymihomo-linux-amd64
            dist/mymihomo-linux-arm64

